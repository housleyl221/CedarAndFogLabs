<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cedar and Fog Labs</title>
  <meta name="description" content="Cedar and Fog Labs — software studio crafting thoughtful digital tools.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌲</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --sage: #7a9a7e;
      --sage-light: #9bb49e;
      --sage-muted: #8a9e8c;
      --cedar: #8b5e3c;
      --cedar-light: #a47551;
      --cream: #faf8f4;
      --cream-mid: #f2efe8;
      --text: #3a3632;
      --text-muted: #7a756e;
    }

    html {
      height: 100%;
    }

    body {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--cream);
      background-image:
        /* Paper fiber — thin hairlines with more spacing */
        repeating-linear-gradient(
          115deg,
          transparent,
          transparent 8px,
          rgba(139,94,60,0.035) 8px,
          rgba(139,94,60,0.035) 8.5px
        ),
        repeating-linear-gradient(
          55deg,
          transparent,
          transparent 12px,
          rgba(90,80,70,0.03) 12px,
          rgba(90,80,70,0.03) 12.5px
        ),
        repeating-linear-gradient(
          165deg,
          transparent,
          transparent 10px,
          rgba(122,154,126,0.025) 10px,
          rgba(122,154,126,0.025) 10.5px
        ),
        /* Base gradient */
        linear-gradient(
          160deg,
          var(--cream) 0%,
          var(--cream-mid) 40%,
          #ede9e1 70%,
          #f0ece5 100%
        );
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      color: var(--text);
      padding: 2rem;
      text-align: center;
    }

    .content {
      opacity: 0;
      animation: fade-in 1.2s ease-out 0.2s forwards;
    }

    @media (prefers-reduced-motion: reduce) {
      .content {
        opacity: 1;
        animation: none;
      }
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tree {
      width: 48px;
      height: 48px;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Helvetica, Arial, sans-serif;
      font-weight: 500;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--text);
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--sage);
      margin: 1.5rem auto;
      opacity: 0.5;
    }

    .email a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
    }

    .email a:hover,
    .email a:focus-visible {
      color: var(--sage);
    }

    .email a:focus-visible {
      outline: 2px solid var(--sage-light);
      outline-offset: 4px;
      border-radius: 2px;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <main class="content">
    <svg class="tree" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Cedar tree glyph -->
      <path d="M24 4 L16 18 L19 18 L12 30 L16 30 L10 42 L38 42 L32 30 L36 30 L29 18 L32 18 Z"
            fill="var(--sage)" opacity="0.7"/>
      <rect x="22" y="42" width="4" height="4" rx="0.5" fill="var(--cedar)" opacity="0.5"/>
    </svg>

    <h1>Cedar &amp; Fog Labs</h1>

    <div class="divider" role="presentation"></div>

    <p class="email">
      <a href="mailto:laura@cedarandfoglabs.com">laura@cedarandfoglabs.com</a>
    </p>

    <footer>
      &copy; 2026 Cedar &amp; Fog Labs, LLC
    </footer>
  </main>
</body>
</html>
