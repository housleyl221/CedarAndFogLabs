<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cedar and Fog Labs</title>
  <meta name="description" content="Cedar and Fog Labs — software studio crafting thoughtful digital tools.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌲</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --fog-light: #e8ecf1;
      --fog-mid: #c5cdd8;
      --fog-dark: #6b7a8d;
      --cedar: #8b5e3c;
      --cedar-light: #a47551;
      --text: #2c3440;
      --text-muted: #5a6575;
    }

    html {
      height: 100%;
    }

    body {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(
        160deg,
        #f0f3f7 0%,
        var(--fog-light) 30%,
        #dfe4ec 60%,
        #e2e7ef 100%
      );
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      color: var(--text);
      padding: 2rem;
      text-align: center;
    }

    .content {
      opacity: 0;
      animation: fade-in 1.2s ease-out 0.2s forwards;
    }

    @media (prefers-reduced-motion: reduce) {
      .content {
        opacity: 1;
        animation: none;
      }
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tree {
      width: 48px;
      height: 48px;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 300;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      letter-spacing: -0.01em;
      line-height: 1.2;
      color: var(--text);
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--cedar);
      margin: 1.5rem auto;
      opacity: 0.5;
    }

    .email a {
      color: var(--fog-dark);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
    }

    .email a:hover,
    .email a:focus-visible {
      color: var(--cedar);
    }

    .email a:focus-visible {
      outline: 2px solid var(--cedar-light);
      outline-offset: 4px;
      border-radius: 2px;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <main class="content">
    <svg class="tree" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Cedar tree glyph -->
      <path d="M24 4 L16 18 L19 18 L12 30 L16 30 L10 42 L38 42 L32 30 L36 30 L29 18 L32 18 Z"
            fill="var(--cedar)" opacity="0.7"/>
      <rect x="22" y="42" width="4" height="4" rx="0.5" fill="var(--cedar)" opacity="0.5"/>
    </svg>

    <h1>Cedar &amp; Fog Labs</h1>

    <div class="divider" role="presentation"></div>

    <p class="email">
      <a href="mailto:laura@cedarandfoglabs.com">laura@cedarandfoglabs.com</a>
    </p>

    <footer>
      &copy; 2026 Cedar &amp; Fog Labs, LLC
    </footer>
  </main>
</body>
</html>
