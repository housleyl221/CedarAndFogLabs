  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --sage: #7a9a7e;
      --sage-light: #9bb49e;
      --sage-muted: #8a9e8c;
      --sage-pale: #e8f0e9;
      --sw-sage: #527264;
      --sw-sage-dark: #3D5447;
      --sw-accent: #C4926E;
      --cedar: #8b5e3c;
      --cedar-light: #a47551;
      --cream: #faf8f4;
      --cream-mid: #f2efe8;
      --text: #3a3632;
      --text-muted: #7a756e;
    }

    html {
      height: 100%;
    }

    body {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--cream);
      background-image:
        repeating-linear-gradient(
          115deg,
          transparent,
          transparent 8px,
          rgba(139,94,60,0.035) 8px,
          rgba(139,94,60,0.035) 8.5px
        ),
        repeating-linear-gradient(
          55deg,
          transparent,
          transparent 12px,
          rgba(90,80,70,0.03) 12px,
          rgba(90,80,70,0.03) 12.5px
        ),
        repeating-linear-gradient(
          165deg,
          transparent,
          transparent 10px,
          rgba(122,154,126,0.025) 10px,
          rgba(122,154,126,0.025) 10.5px
        ),
        linear-gradient(
          160deg,
          var(--cream) 0%,
          var(--cream-mid) 40%,
          #ede9e1 70%,
          #f0ece5 100%
        );
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      color: var(--text);
      padding: 2rem;
      text-align: center;
    }


    .content {
      max-width: 540px;
      width: 100%;
      opacity: 0;
      animation: fade-in 1.2s ease-out 0.2s forwards;
    }

    @media (prefers-reduced-motion: reduce) {
      .content {
        opacity: 1;
        animation: none;
      }
      .product-card {
        opacity: 1;
        animation: none;
      }
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tree {
      width: 48px;
      height: 48px;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Helvetica, Arial, sans-serif;
      font-weight: 500;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--text);
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--sage);
      margin: 1.5rem auto;
      opacity: 0.5;
    }

    .tagline {
      font-size: 1.05rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    /* --- Product card --- */
    .product-card {
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(82,114,100,0.15);
      border-radius: 16px;
      padding: 2rem 1.75rem 1.75rem;
      margin: 0 auto 2rem;
      text-align: left;
      box-shadow:
        0 1px 2px rgba(82,114,100,0.06),
        0 4px 12px rgba(82,114,100,0.08),
        0 12px 32px rgba(58,54,50,0.06);
      opacity: 0;
      animation: card-in 0.8s ease-out 0.6s forwards;
      color: inherit;
    }

    .product-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--sw-sage), var(--sw-accent), var(--sw-sage));
      opacity: 0.8;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .card-title {
      font-family: "Lora", Georgia, "Times New Roman", serif;
      font-weight: 600;
      font-size: 1.5rem;
      letter-spacing: -0.01em;
      color: var(--sw-sage);
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: "DM Sans", sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--sw-sage);
      background: var(--sage-pale);
      padding: 4px 10px;
      border-radius: 99px;
      border: 1px solid rgba(82,114,100,0.12);
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--sw-sage);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    @media (prefers-reduced-motion: reduce) {
      .live-dot {
        animation: none;
      }
    }

    .card-subtitle {
      font-family: "DM Sans", sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--sw-accent);
      margin-bottom: 0.75rem;
    }

    .card-description {
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .card-cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    .card-cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: "DM Sans", sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: #fff;
      background: var(--sw-sage);
      width: 148px;
      height: 44px;
      padding: 0 1rem;
      border-radius: 9px;
      letter-spacing: 0.01em;
      text-decoration: none;
      transition: background 0.25s ease, border-color 0.25s ease;
    }

    .card-cta-btn:hover {
      background: var(--sw-sage-dark);
    }

    .card-cta-btn:focus-visible {
      outline: 2px solid var(--sw-sage);
      outline-offset: 3px;
    }

    .store-badge {
      display: inline-block;
      line-height: 0;
      border-radius: 9px;
      transition: opacity 0.25s ease;
    }

    .store-badge:hover {
      opacity: 0.85;
    }

    .store-badge:focus-visible {
      outline: 2px solid var(--sw-sage);
      outline-offset: 3px;
    }

    .store-badge img {
      height: 44px;
      width: auto;
      display: block;
    }

    /* --- End product card --- */

    .email {
      margin-bottom: 0;
    }

    .email a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
    }

    .email a:hover,
    .email a:focus-visible {
      color: var(--sage);
    }

    .email a:focus-visible {
      outline: 2px solid var(--sage-light);
      outline-offset: 4px;
      border-radius: 2px;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    footer p + p {
      margin-top: 0.35rem;
    }

    footer a {
      color: var(--text-muted);
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.2s ease;
    }

    footer a:hover {
      color: var(--sage);
    }
  </style>
